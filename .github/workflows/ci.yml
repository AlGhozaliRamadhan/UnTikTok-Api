name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 4 * * *'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.x', '22.x']

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check Playwright version alignment (ADR-004)
      run: npm run check:playwright-version

    - name: Check npm version drift (informational)
      run: npm run check:npm-version
      continue-on-error: true
      env:
        # Force-enable even under CI; CI auto-disable is for *users*, not maintainers.
        CI: ''

    - name: Lint
      run: npm run lint

    - name: Typecheck
      run: npm run typecheck

    - name: Typecheck docs examples (ADR-012)
      run: npm run typecheck:docs

    - name: Build
      run: npm run build

    - name: Unit tests
      run: npm run test:run

  tests-integration:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'schedule'
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Integration tests (live network)
      env:
        CI_NETWORK: 'true'
        ms_token: ${{ secrets.MS_TOKEN }}
      run: npm run test:run
